<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Checker</title>
</head>
<body>

    <h1>English Word Checker</h1>

    <form id="wordCheckForm">
        <label for="textInput">Enter 8 Distinct Letters:</label>
        <input type="text" id="textInput" name="textInput" pattern="[A-Za-z]{8}|[QZqz],[A-Za-z]{7}|[A-Za-z],[QZqz],[A-Za-z]{6}|[A-Za-z]{2},[QZqz],[A-Za-z]{5}|[A-Za-z]{3},[QZqz],[A-Za-z]{4}|[A-Za-z]{4},[QZqz],[A-Za-z]{3}|[A-Za-z]{5},[QZqz],[A-Za-z]{2}|[A-Za-z]{6},[QZqz],[A-Za-z]|[A-Za-z]{7},[QZqz]" required>
        <br>
        <button type="button" onclick="checkWords()">Check Words</button>
    </form>

    <div id="resultContainer"></div>

    <script>
        function readWordList(callback) {
            const xhr = new XMLHttpRequest();
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    const wordList = xhr.responseText.split('\n').filter(word => word.trim() !== '');
                    callback(wordList);
                }
            };
            xhr.open('GET', 'words.txt', true);
            xhr.send();
        }

        function checkWords() {
            console.log("Button clicked");
            
            const inputText = document.getElementById('textInput').value.toUpperCase().split(',');
        
            // Check for distinct letters
            const distinctLetters = new Set(inputText);
            if (inputText.length !== distinctLetters.size) {
                console.error("Please enter 8 distinct letters.");
                return;
            }
        
            // Replace 'q' with 'z' and vice versa in the input
            const modifiedInput = inputText.map(letter => (letter === 'Q' ? 'Z' : letter === 'Z' ? 'Q' : letter));
            
            console.log("Modified input:", modifiedInput);
        
            readWordList(function (wordList) {
                const resultContainer = document.getElementById('resultContainer');
                resultContainer.innerHTML = ''; // Clear previous results
        
                console.log("Word list:", wordList);
        
                wordList.forEach(word => {
                    if (isValidWord(word, modifiedInput)) {
                        console.log("Found word:", word);
                        const resultDiv = document.createElement('div');
                        resultDiv.textContent = "Found word: " + word;
                        resultContainer.appendChild(resultDiv);
                    }
                });
            });
        }

        function isValidWord(word, inputLetters) {
            console.log("Checking word:", word);
        
            const usedLetters = new Set();
            let position = 0;
        
            for (let i = 0; i < word.length; i++) {
                const letter = word[i].toUpperCase();
        
                if (position < inputLetters.length && !usedLetters.has(letter.toUpperCase())) {
                    const inputLetter = inputLetters[position].toUpperCase();
                    if (letter === inputLetter) {
                        usedLetters.add(letter);
                        position++;
                    } else {
                        console.log("Invalid letter:", letter);
                        return false;
                    }
                } else {
                    console.log("Invalid letter:", letter);
                    return false;
                }
            }
        
            console.log("Word is valid");
            return true; // Ensure all positions are validated
        }
    </script>

</body>
</html>
