<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Checker</title>
</head>
<body>

    <h1>English Word Checker</h1>

    <form id="wordCheckForm">
        <label for="textInput">Enter 8 Distinct Letters:</label>
        <input type="text" id="textInput" name="textInput" pattern="[A-Za-z]{8}|[QZqz],[A-Za-z]{7}|[A-Za-z],[QZqz],[A-Za-z]{6}|[A-Za-z]{2},[QZqz],[A-Za-z]{5}|[A-Za-z]{3},[QZqz],[A-Za-z]{4}|[A-Za-z]{4},[QZqz],[A-Za-z]{3}|[A-Za-z]{5},[QZqz],[A-Za-z]{2}|[A-Za-z]{6},[QZqz],[A-Za-z]|[A-Za-z]{7},[QZqz]" required>
        <br>
        <button type="button" onclick="checkWords()">Check Words</button>
    </form>

    <div id="resultContainer"></div>

    <script>
        function readWordList(callback) {
            const xhr = new XMLHttpRequest();
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    const wordList = xhr.responseText.split('\n').filter(word => word.trim() !== '');
                    callback(wordList);
                }
            };
            xhr.open('GET', 'words.txt', true); // Updated file name to 'words.txt'
            xhr.send();
        }

        function checkWords() {
            const inputText = document.getElementById('textInput').value.toUpperCase().split(',');

            // Check for distinct letters
            const distinctLetters = new Set(inputText);
            if (inputText.length !== distinctLetters.size) {
                console.error("Please enter 8 distinct letters.");
                return;
            }

            // Replace 'q' with 'z' and vice versa in the input
            const modifiedInput = inputText.map(letter => (letter === 'Q' ? 'Z' : letter === 'Z' ? 'Q' : letter));

            const queryString = modifiedInput.map(letter => encodeURIComponent(letter)).join(',');

            readWordList(function (wordList) {
                const resultContainer = document.getElementById('resultContainer');
                resultContainer.innerHTML = ''; // Clear previous results

                function recursiveCheck(remaining, currentWord) {
                    if (remaining.length === 0) {
                        if (currentWord.length === inputText.length) {
                            console.log("Found word:", currentWord);
                            const resultDiv = document.createElement('div');
                            resultDiv.textContent = "Found word: " + currentWord;
                            resultContainer.appendChild(resultDiv);
                        }
                        return;
                    }
                
                    const firstTwoLetters = remaining.slice(0, 2);
                    const lastLetter = remaining.slice(-1);
                
                    // Check each position in the word
                    for (let j = 0; j <= currentWord.length; j++) {
                        const newWord = currentWord.slice(0, j) + firstTwoLetters.join('') + lastLetter.join('') + currentWord.slice(j);
                
                        // Recursive call with the remaining letters and the updated word
                        recursiveCheck(remaining.slice(2, -1), newWord);
                    }
                }

                const url = `words.txt?letters=${queryString}`;

                const xhr = new XMLHttpRequest();
                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        const wordList = xhr.responseText.split('\n').filter(word => word.trim() !== '');
                        recursiveCheck(modifiedInput, ''); // Start with an empty word
                    }
                };
                xhr.open('GET', url, true);
                xhr.send();
            });
        }
    </script>

</body>
</html>
